name: Auto Update Room Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
    - name: 檢出專案程式碼
      uses: actions/checkout@v4
    - name: 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: 安裝套件
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
    - name: 執行自動化觀測腳本
      run: python update_rooms.py
