<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>閒人案內所 ｜ 官方傳送門</title>
<style>
        :root {
            --bg-dark: #050308;
            --neon-gold: #ffb020;
            --neon-purple: #b366ff;
            --neon-orange: #ff7324;
            --neon-blue: #00f0ff;
            --neon-pink: #ff2a6d;
            --neon-cyan: #00f3ff;
            --text-light: #ffffff;
            --text-gray: #9c97aa;
            --card-glass: rgba(16, 12, 30, 0.72);
            --border-glow: rgba(179, 102, 255, 0.18);
            --ease-premium: cubic-bezier(0.23, 1, 0.32, 1);
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(179, 102, 255, 0.24) 0%, transparent 55%),
                radial-gradient(circle at 100% 20%, rgba(255, 115, 36, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 0% 80%, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 12px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.008) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 460px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .header { margin-bottom: 30px; }
        .logo-container { position: relative; width: 96px; height: 96px; margin: 0 auto 20px; }
        .logo-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); animation: pulseGlow 3s infinite alternate var(--ease-premium); filter: blur(14px); opacity: 0.85; }
        .logo-inner { position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; background: #0c061a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; border: 1px solid rgba(255, 255, 255, 0.14); box-shadow: inset 0 0 25px rgba(179, 102, 255, 0.4); }
        .title { font-size: 30px; font-weight: 900; letter-spacing: 5px; margin-bottom: 8px; background: linear-gradient(90deg, #ffffff 10%, var(--neon-gold), var(--neon-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 15px rgba(255, 115, 36, 0.35)); }
        .subtitle { font-size: 11px; color: var(--text-gray); letter-spacing: 5px; text-transform: uppercase; opacity: 0.75; font-weight: 500; }

        .tab-navigation {
            display: flex;
            background: rgba(8, 5, 18, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 5px;
            margin-bottom: 30px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            gap: 3px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.03);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 2px;
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 11.5px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .tab-btn.active {
            color: #ffffff;
            background: linear-gradient(135deg, rgba(179, 102, 255, 0.38) 0%, rgba(0, 240, 255, 0.18) 100%);
            border: 1px solid rgba(179, 102, 255, 0.4);
            box-shadow: 0 0 15px rgba(179, 102, 255, 0.25);
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
            transform: scale(1.02);
        }

        .sub-tab-navigation { display: flex; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 4px; margin-bottom: 25px; gap: 4px; }
        .sub-tab-btn { flex: 1; padding: 10px 2px; background: none; border: none; color: var(--text-gray); font-size: 11.5px; font-weight: 700; border-radius: 10px; cursor: pointer; transition: var(--transition-smooth); white-space: nowrap; }
        .sub-tab-btn.active { color: #ffffff; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.12); text-shadow: 0 0 4px rgba(255, 255, 255, 0.5); }

        .card-box {
            background: var(--card-glass);
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            padding: 28px 22px;
            margin-bottom: 28px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65), inset 0 1px 1px rgba(255, 255, 255, 0.03);
            text-align: left;
        }

        .card-box.phone-box { border-color: rgba(0, 240, 255, 0.32); box-shadow: 0 0 35px rgba(0, 240, 255, 0.15), 0 20px 50px rgba(0, 0, 0, 0.65); }
        .card-box.sub-notice-box { background: rgba(10, 7, 22, 0.5); border-color: rgba(255,255,255,0.02); box-shadow: none; padding: 10px 5px; }

        .card-header { font-size: 14px; font-weight: 800; color: var(--neon-gold); margin-bottom: 24px; display: flex; align-items: center; gap: 14px; letter-spacing: 2px; text-shadow: 0 0 12px rgba(255, 176, 32, 0.45); }
        .card-header.blue-header { color: var(--neon-blue); text-shadow: 0 0 12px rgba(0, 240, 255, 0.45); }
        .card-header::after { content: ''; flex-grow: 1; height: 1px; background: linear-gradient(to right, rgba(255, 176, 32, 0.35), transparent); }
        .card-header.blue-header::after { background: linear-gradient(to right, rgba(0, 240, 255, 0.35), transparent); }

        .link-card { display: flex; align-items: center; padding: 24px 26px; background: rgba(255, 255, 255, 0.005); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 24px; text-decoration: none; color: #ffffff; margin-bottom: 20px; transition: var(--ease-premium) 0.45s; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
        .link-card::before { content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%; background: linear-gradient(105deg, transparent, rgba(255, 255, 255, 0.1), transparent); transition: 0.6s var(--ease-premium); }
        .link-card:hover::before, .link-card:active::before { left: 150%; }

        .link-card.match-card { border: 1.5px solid rgba(255, 115, 36, 0.32); background: linear-gradient(90deg, rgba(255, 115, 36, 0.06) 0%, rgba(16, 12, 30, 0.4) 100%); }
        .link-card.match-card:hover, .link-card.match-card:active { border-color: var(--neon-orange); transform: translateY(-5px) scale(1.015); box-shadow: 0 12px 35px rgba(255, 115, 36, 0.3); }
        .link-card.chat-card { border: 1.5px solid rgba(179, 102, 255, 0.32); background: linear-gradient(90deg, rgba(179, 102, 255, 0.06) 0%, rgba(16, 12, 30, 0.4) 100%); }
        .link-card.chat-card:hover, .link-card.chat-card:active { border-color: var(--neon-purple); transform: translateY(-5px) scale(1.015); box-shadow: 0 12px 35px rgba(179, 102, 255, 0.3); }
        .link-card.room-card { border: 1px solid rgba(255, 255, 255, 0.05); background: rgba(255, 255, 255, 0.003); }
        .link-card.room-card:hover, .link-card.room-card:active { border-color: rgba(255, 255, 255, 0.22); background: rgba(255, 255, 255, 0.02); transform: translateY(-3px); }

        .link-icon { font-size: 30px; margin-right: 22px; width: 40px; display: flex; align-items: center; justify-content: center; }
        .match-card .link-icon { filter: drop-shadow(0 0 10px var(--neon-orange)); }
        .chat-card .link-icon { filter: drop-shadow(0 0 10px var(--neon-purple)); }
        .link-content { text-align: left; flex-grow: 1; }
        .link-title { font-size: 16.5px; font-weight: 800; margin-bottom: 5px; letter-spacing: 0.5px; }
        .link-desc { font-size: 12.5px; color: #aaa2b5; opacity: 0.85; }
        .badge { font-size: 10px; padding: 4px 11px; border-radius: 20px; font-weight: 700; margin-left: 10px; background-color: rgba(255, 115, 36, 0.16); color: #ff9a6e; border: 1px solid rgba(255, 115, 36, 0.28); letter-spacing: 0.5px; }

        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .contact-card { display: flex; flex-direction: column; align-items: center; padding: 28px 14px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.015) 0%, rgba(255, 255, 255, 0.002) 100%); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 26px; text-decoration: none; color: #ffffff; transition: var(--ease-premium) 0.45s; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .contact-card:hover, .contact-card:active { background: rgba(255, 255, 255, 0.035); border-color: var(--neon-gold); transform: translateY(-6px); box-shadow: 0 15px 35px rgba(255, 176, 32, 0.16); }
        .contact-avatar { width: 56px; height: 56px; border-radius: 50%; background: #140d24; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 14px; border: 1px solid rgba(255, 176, 32, 0.22); box-shadow: 0 0 15px rgba(255, 176, 32, 0.12); transition: 0.4s var(--ease-premium); }
        .contact-card:hover .contact-avatar { transform: scale(1.1) rotate(5deg); border-color: var(--neon-gold); box-shadow: 0 0 22px rgba(255, 176, 32, 0.4); }
        .contact-name { font-weight: 800; font-size: 14px; letter-spacing: 1px; color: #fcf4b6; text-shadow: 0 0 6px rgba(255, 176, 32, 0.2); }

        .primary-card { display: flex; align-items: center; padding: 24px; background: linear-gradient(90deg, rgba(0, 240, 255, 0.12) 0%, rgba(13, 8, 24, 0.5) 100%); border: 1.5px solid var(--neon-blue); border-radius: 24px; color: #ffffff; text-decoration: none; transition: var(--ease-premium) 0.45s; box-shadow: 0 0 25px rgba(0, 240, 255, 0.15); margin-bottom: 8px; }
        .primary-card:hover, .primary-card:active { background: linear-gradient(90deg, rgba(0, 240, 255, 0.22) 0%, rgba(179, 102, 255, 0.05) 100%); border-color: #ffffff; transform: translateY(-5px); box-shadow: 0 0 35px rgba(0, 240, 255, 0.45); }
        .primary-icon { font-size: 30px; margin-right: 20px; filter: drop-shadow(0 0 8px var(--neon-blue)); }
        
        .grid-rooms { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .room-item { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60px; background: rgba(255, 255, 255, 0.012); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; color: #dfd8eb; text-decoration: none; font-size: 14.5px; font-weight: 700; transition: 0.3s var(--ease-premium); }
        .room-item span { font-size: 8px; color: #726682; font-weight: 600; margin-top: 3px; letter-spacing: 0.5px; }
        .room-item:hover, .room-item:active { background: linear-gradient(135deg, rgba(179, 102, 255, 0.3) 0%, rgba(255, 115, 36, 0.2) 100%); border-color: var(--neon-orange); color: #ffffff; transform: translateY(-5px) scale(1.06); box-shadow: 0 6px 20px rgba(255, 115, 36, 0.35); }
        .room-item:hover span { color: #ffd2ba; }

        .room-item.busy { border-color: var(--neon-pink) !important; background: linear-gradient(135deg, rgba(255, 42, 109, 0.15) 0%, rgba(12, 6, 20, 0.8) 100%) !important; box-shadow: 0 0 15px rgba(255, 42, 109, 0.25) !important; position: relative; pointer-events: none; opacity: 0.75; }
        .room-item.busy::after { content: '● BUSY'; position: absolute; top: 4px; right: 6px; font-size: 7px; font-weight: 900; color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); letter-spacing: 0.5px; animation: flashGlow 1.5s infinite alternate; }

        .talk-list { display: flex; flex-direction: column; gap: 14px; }
        .talk-item { display: flex; align-items: center; padding: 20px 24px; background: linear-gradient(90deg, rgba(179, 102, 255, 0.02) 0%, rgba(255, 255, 255, 0.003) 100%); border: 1px solid rgba(179, 102, 255, 0.1); border-left: 3px solid rgba(179, 102, 255, 0.32); border-radius: 18px; color: #ffffff; text-decoration: none; transition: var(--ease-premium) 0.4s; }
        .talk-item:hover, .talk-item:active { border-color: var(--neon-purple); border-left-color: var(--neon-cyan); background: linear-gradient(90deg, rgba(179, 102, 255, 0.16) 0%, rgba(0, 240, 255, 0.04) 100%); transform: translateX(6px); box-shadow: 0 5px 20px rgba(179, 102, 255, 0.22); }
        .talk-item.busy { border-color: var(--neon-pink) !important; border-left-color: var(--neon-pink) !important; background: linear-gradient(90deg, rgba(255, 42, 109, 0.15) 0%, rgba(12, 6, 20, 0.8) 100%) !important; box-shadow: 0 0 15px rgba(255, 42, 109, 0.25) !important; opacity: 0.75; }
        .talk-item.busy::after { content: '● BUSY'; font-size: 10px; font-weight: 900; color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); letter-spacing: 0.5px; animation: flashGlow 1.5s infinite alternate; margin-left: auto; }

        .policy-content { line-height: 1.85; font-size: 14.5px; color: #e2daf0; }
        .policy-section { margin-bottom: 32px; }
        .policy-section-title { font-size: 16px; font-weight: 800; color: var(--neon-gold); margin-bottom: 16px; border-left: 3.5px solid var(--neon-gold); padding-left: 14px; text-shadow: 0 0 12px rgba(255, 176, 32, 0.35); letter-spacing: 0.5px; }
        .policy-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
        .policy-item { background: rgba(255, 255, 255, 0.005); border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 18px; padding: 20px 22px; box-shadow: inset 0 1px 15px rgba(0,0,0,0.35); position: relative; overflow: hidden; }
        .policy-item.notice-cyan { border-left: 3.5px solid var(--neon-cyan); }
        .policy-item.notice-pink { border-left: 3.5px solid var(--neon-pink); }
        .policy-item.notice-blue { border-left: 3.5px solid var(--neon-blue); }
        .policy-item-title { font-weight: 800; color: #ffffff; margin-bottom: 6px; font-size: 15.5px; letter-spacing: 0.5px; }
        .policy-item-desc { color: #aca4ba; font-size: 13.5px; line-height: 1.7; }
        
        .footer { margin-top: 50px; font-size: 11px; color: #554e63; letter-spacing: 2px; opacity: 0.65; }
        
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.5s var(--ease-premium) forwards; }
        
        @keyframes pulseGlow { 0% { transform: scale(0.96); box-shadow: 0 0 15px rgba(179, 102, 255, 0.35); } 100% { transform: scale(1.04); box-shadow: 0 0 35px rgba(0, 240, 255, 0.55); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes flashGlow { 0% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="logo-pulse"></div>
                <div class="logo-inner">👻</div>
            </div>
            <h1 class="title">閒人案內所</h1>
            <p class="subtitle">VIP Lounge Portal</p>
        </div>
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchTab('home')">主頁</button>
            <button class="tab-btn" onclick="switchTab('rooms')">VIP 招待所</button>
            <button class="tab-btn" onclick="switchTab('notice')">主要公告</button>
            <button class="tab-btn" onclick="switchTab('policy')">交付及退費</button>
        </div>
        <div id="panel-home" class="tab-panel active">
             <!-- 你的分頁內容 -->
        </div>
        <div id="panel-rooms" class="tab-panel">
             <!-- 你的房間連結內容 -->
        </div>
        <!-- 其他分頁 -->
    </div>
    <script>
        let isUnlocked = false;
        function switchTab(tabId) {
            if (tabId === 'rooms' && !isUnlocked) {
                let password = prompt("🔒 此頁面為【社群會員限定】\n請輸入專屬通關密碼：");
                if (password === "0126") { alert("🔓 密碼正確！"); isUnlocked = true; } 
                else { alert("❌ 密碼錯誤！"); return; }
            }
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="${tabId}"]`).classList.add('active');
            document.getElementById('panel-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
